name: Build & Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & FTP Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ───────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Node.js ───────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Install dependencies ────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Build React app ─────────────────────────────────────────────
      - name: Build production bundle
        run: npm run build

      # ── 4.5. Inject production DB credentials into config.php ─────────
      - name: Inject DB credentials
        run: |
          sed -i "s|getenv('DB_USER') ?: ''|getenv('DB_USER') ?: '${{ secrets.DB_USER }}'|g" api/config.php
          sed -i "s|getenv('DB_PASS') ?: ''|getenv('DB_PASS') ?: '${{ secrets.DB_PASS }}'|g" api/config.php
          sed -i "s|getenv('DB_NAME') ?: ''|getenv('DB_NAME') ?: '${{ secrets.DB_NAME }}'|g" api/config.php

      # ── 5. Deploy built frontend (dist/) → public_html/ ───────────────
      - name: Deploy frontend to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: ./dist/
          server-dir: /public_html/
          exclude: |
            **/.git*
            **/.git*/**

      # ── 6. Deploy PHP backend (api/) → public_html/api/ ───────────────
      - name: Deploy API to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: ./api/
          server-dir: /public_html/api/
          exclude: |
            **/.git*
            **/migrations/**
